        type: string
        required: true
      project_id:
        type: uuid
        required: true
      stage_run_id:
        type: string
      risk_type:
        type: string
        required: true
        max_length: 64
      description:
        type: text
        required: true
      severity:
        type: string
        required: true
        max_length: 32
      estimated_impact:
        type: text
      impact:
        type: text
      mitigation:
        type: text
      metadata:
        type: jsonb
      created_at:
        type: datetime
