version: "1.0"
agent_id: "ecc-estimating-agent"

tables:
  result_projects:
    description: Canonical project records.
    writable: true
    write_mode: upsert
    columns:
      project_id:
        type: uuid
        primary_key: true
        required: true
        auto_generate: true
      run_id:
        type: string
        required: true
      external_project_key:
        type: string
        max_length: 128
      project_name:
        type: string
        required: true
        max_length: 255
      market:
        type: string
        max_length: 128
      address:
        type: text
      trades:
        type: jsonb
        required: true
      status:
        type: string
        required: true
        max_length: 64
      current_pipeline_run_id:
        type: string
      created_at:
        type: datetime
        required: true
        auto_generate: true
      updated_at:
        type: datetime
        required: true
        auto_generate: true
    conflict_columns:
      - project_id
    indexes:
      - columns: [status, market]
        name: idx_result_projects_status_market
  result_inputs:
    description: Source file and event inventory.
    writable: true
    write_mode: upsert
    columns:
      input_id:
        type: uuid
        primary_key: true
        required: true
        auto_generate: true
      run_id:
        type: string
        required: true
      project_id:
        type: uuid
        required: true
      source_system:
        type: string
        required: true
        max_length: 64
      input_type:
        type: string
        required: true
        max_length: 64
      uri:
        type: text
        required: true
      file_name:
        type: string
        max_length: 255
      content_hash:
        type: string
        max_length: 128
      metadata:
        type: jsonb
      received_at:
        type: datetime
        required: true
        auto_generate: true
      created_at:
        type: datetime
        auto_generate: true
      updated_at:
        type: datetime
        auto_generate: true
    conflict_columns:
      - input_id
    indexes:
      - columns: [project_id, source_system]
        name: idx_result_inputs_project_source
      - columns: [content_hash]
        name: idx_result_inputs_hash
  result_pipeline_runs:
    description: "End-to-end pipeline runs."
    writable: true
    write_mode: insert
    columns:
      pipeline_run_id:
        type: uuid
        primary_key: true
        required: true
        auto_generate: true
      run_id:
        type: string
        required: true
      project_id:
        type: uuid
        required: true
      trigger_type:
        type: string
        required: true
        max_length: 64
      status:
        type: string
        required: true
        max_length: 64
      requested_by:
        type: string
        max_length: 255
      pricing_config_id:
        type: string
      started_at:
        type: datetime
        required: true
        auto_generate: true
      completed_at:
        type: datetime
      summary:
        type: text
      created_at:
        type: datetime
        auto_generate: true
      updated_at:
        type: datetime
        auto_generate: true
    conflict_columns:
      - pipeline_run_id
    indexes:
      - columns: [project_id, status]
        name: idx_result_pipeline_runs_project_status
  result_stage_runs:
    description: Individual stage runs with rerun history.
    writable: true
    write_mode: insert
    columns:
      stage_run_id:
        type: uuid
        primary_key: true
        required: true
        auto_generate: true
      run_id:
        type: string
        required: true
      pipeline_run_id:
        type: string
        required: true
      project_id:
        type: uuid
        required: true
      stage_number:
        type: integer
        required: true
      stage_name:
        type: string
        required: true
        max_length: 128
      rerun_of_stage_run_id:
        type: string
      status:
        type: string
        required: true
        max_length: 64
      inputs_snapshot:
        type: jsonb
        required: true
      outputs_summary:
        type: jsonb
      started_at:
        type: datetime
        required: true
        auto_generate: true
      completed_at:
        type: datetime
      created_at:
        type: datetime
        auto_generate: true
      updated_at:
        type: datetime
        auto_generate: true
    conflict_columns:
      - stage_run_id
    indexes:
      - columns: [project_id, stage_number, status]
        name: idx_result_stage_runs_project_stage
  result_scope_items:
    description: Structured scope/takeoff items.
    writable: true
    write_mode: upsert
    columns:
      scope_item_id:
        type: uuid
        primary_key: true
        required: true
        auto_generate: true
      run_id:
        type: string
        required: true
      project_id:
        type: uuid
        required: true
      pipeline_run_id:
        type: string
      stage_run_id:
        type: string
      trade:
        type: string
        required: true
        max_length: 64
      category:
        type: string
        max_length: 96
      description:
        type: text
        required: true
      quantity:
        type: float
      unit:
        type: string
        max_length: 32
      confidence:
        type: float
      source_refs:
        type: jsonb
      metadata:
        type: jsonb
      created_at:
        type: datetime
        auto_generate: true
      updated_at:
        type: datetime
        auto_generate: true
    conflict_columns:
      - scope_item_id
    indexes:
      - columns: [project_id, trade]
        name: idx_result_scope_items_project_trade
  result_evidence_refs:
    description: Evidence source anchors.
    writable: true
    write_mode: upsert
    columns:
      evidence_ref_id:
        type: uuid
        primary_key: true
        required: true
        auto_generate: true
      run_id:
        type: string
        required: true
      project_id:
        type: uuid
        required: true
      input_id:
        type: uuid
      source_system:
        type: string
        required: true
        max_length: 64
      source_ref:
        type: jsonb
        required: true
      metadata:
        type: jsonb
      created_at:
        type: datetime
        auto_generate: true
      updated_at:
        type: datetime
        auto_generate: true
    conflict_columns:
      - evidence_ref_id
    indexes:
      - columns: [project_id, input_id]
        name: idx_result_evidence_project_input
  result_estimate_lines:
    description: Normalized estimate lines with source/pricing lineage.
    writable: true
    write_mode: upsert
    columns:
      estimate_line_id:
        type: uuid
        primary_key: true
        required: true
        auto_generate: true
      run_id:
        type: string
        required: true
      project_id:
        type: uuid
        required: true
      pipeline_run_id:
        type: string
        required: true
      stage_run_id:
        type: string
      trade:
        type: string
        required: true
        max_length: 64
      sheet_tab:
        type: string
        required: true
        max_length: 128
      line_code:
        type: string
        max_length: 128
      description:
        type: text
        required: true
      quantity:
        type: float
        required: true
      unit:
        type: string
        required: true
        max_length: 32
      unit_price:
        type: float
      extended_price:
        type: float
      source_refs:
        type: jsonb
      pricing_config_id:
        type: string
      metadata:
        type: jsonb
      created_at:
        type: datetime
        auto_generate: true
      updated_at:
        type: datetime
        auto_generate: true
    conflict_columns:
      - estimate_line_id
    indexes:
      - columns: [project_id, pipeline_run_id]
        name: idx_result_estimate_lines_project_run
      - columns: [trade, sheet_tab]
        name: idx_result_estimate_lines_trade_tab
  result_qa_findings:
    description: QA checks and warnings.
    writable: true
    write_mode: upsert
    columns:
      qa_finding_id:
        type: uuid
        primary_key: true
        required: true
        auto_generate: true
      run_id:
        type: string
        required: true
      project_id:
        type: uuid
        required: true
      stage_run_id:
        type: string
      check_name:
        type: string
        required: true
        max_length: 128
      result:
        type: string
        required: true
        max_length: 32
      severity:
        type: string
        max_length: 32
      details:
        type: text
      message:
        type: text
      required_action:
        type: text
      metadata:
        type: jsonb
      created_at:
        type: datetime
        auto_generate: true
      updated_at:
        type: datetime
        auto_generate: true
    conflict_columns:
      - qa_finding_id
    indexes:
