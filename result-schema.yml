        type: string
      diff_type:
        type: string
        required: true
        max_length: 64
      summary:
        type: text
        required: true
      diff_json:
        type: jsonb
      details:
        type: jsonb
      created_at:
        type: datetime
        required: true
        auto_generate: true
    conflict_columns:
