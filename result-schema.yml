        name: idx_result_qa_project_result
  result_rfis:
    description: RFIs and answers.
    writable: true
    write_mode: upsert
    columns:
      rfi_id:
        type: uuid
        primary_key: true
        required: true
        auto_generate: true
      run_id:
        type: string
        required: true
      project_id:
        type: uuid
        required: true
      stage_run_id:
        type: string
      question:
        type: text
        required: true
      reason:
        type: text
      priority:
        type: string
        required: true
        max_length: 32
      status:
        type: string
        required: true
        max_length: 64
      answer:
        type: text
      due_at:
        type: datetime
      created_at:
        type: datetime
        required: true
        auto_generate: true
      updated_at:
        type: datetime
        auto_generate: true
