        required: true
      source:
        type: string
        required: true
        max_length: 128
      status:
        type: string
        required: true
        max_length: 64
      effective_at:
        type: datetime
      created_at:
        type: datetime
        auto_generate: true
      updated_at:
        type: datetime
        required: true
        auto_generate: true
    conflict_columns:
