      run_id:
        type: string
        required: true
      project_id:
        type: uuid
        required: true
      pipeline_run_id:
        type: string
      stage_run_id:
        type: string
      artifact_type:
        type: string
        required: true
        max_length: 96
      uri:
        type: text
        required: true
      version:
        type: integer
        required: true
      status:
        type: string
        required: true
        max_length: 64
      metadata:
        type: jsonb
      created_at:
        type: datetime
        required: true
        auto_generate: true
      updated_at:
        type: datetime
        auto_generate: true
    conflict_columns:
      - artifact_id
    indexes:
      - columns: [project_id, artifact_type]
        name: idx_result_artifacts_project_type
  result_revision_diffs:
    description: Rerun and artifact comparison diffs.
    writable: true
    write_mode: insert
    columns:
      revision_diff_id:
        type: uuid
        primary_key: true
        required: true
