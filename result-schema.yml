      run_id:
        type: string
        required: true
      project_id:
        type: uuid
        required: true
      stage_run_id:
        type: string
      category:
        type: string
        required: true
        max_length: 64
      statement:
        type: text
      text:
        type: text
      impact:
        type: text
      status:
        type: string
        required: true
        max_length: 64
      metadata:
        type: jsonb
      created_at:
        type: datetime
        auto_generate: true
      updated_at:
        type: datetime
        auto_generate: true
    conflict_columns:
